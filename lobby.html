<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sfaccimmopoly — Lobby</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lobby.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="top-bar">
    <span class="logo-small">🎲 Sfaccimmopoly</span>
    <div class="top-bar-actions">
      <button id="btn-lang-it" class="pill">🇮🇹</button>
      <button id="btn-lang-en" class="pill">🇬🇧</button>
      <button id="btn-lang-fr" class="pill">🇫🇷</button>
      <button id="btn-lang-es" class="pill">🇪🇸</button>
      <button id="btn-logout" class="pill danger" data-i18n="nav_logout">Esci</button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="lobby-main">

    <!-- Left: Player identity -->
    <section class="card identity-card">
      <h2 data-i18n="lobby_your_profile">Il tuo profilo</h2>

      <label data-i18n="lobby_your_name">Nome</label>
      <input id="input-name" type="text" maxlength="20"
             placeholder="Es: Luca" autocomplete="off" />

      <label data-i18n="lobby_your_token">Pedina</label>
      <div class="token-grid" id="token-grid">
        <!-- Populated by JS -->
      </div>

      <p class="token-selected-label">
        <span data-i18n="lobby_selected">Selezionata:</span>
        <span id="token-display">—</span>
      </p>
    </section>

    <!-- Right: Rooms -->
    <section class="card rooms-card">
      <div class="rooms-header">
        <h2 data-i18n="lobby_rooms">Stanze</h2>
        <button id="btn-create-room" class="btn-primary" data-i18n="lobby_create_room">
          + Crea stanza
        </button>
      </div>

      <!-- Room list -->
      <div id="room-list" class="room-list">
        <p class="empty-state" data-i18n="lobby_no_rooms">
          Nessuna stanza aperta. Creane una!
        </p>
      </div>
    </section>

  </main>

  <!-- ===== MODAL: Create Room ===== -->
  <div id="modal-create" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 data-i18n="lobby_modal_title">Nuova stanza</h3>

      <label data-i18n="lobby_modal_name">Nome stanza</label>
      <input id="input-room-name" type="text" maxlength="30"
             placeholder="Es: Serata pizza" autocomplete="off" />

      <label data-i18n="lobby_modal_max">Giocatori massimi</label>
      <select id="select-max-players">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn-secondary"
                data-i18n="lobby_modal_cancel">Annulla</button>
        <button id="btn-modal-confirm" class="btn-primary"
                data-i18n="lobby_modal_confirm">Crea</button>
      </div>
    </div>
  </div>

  <!-- ===== FIREBASE + APP SCRIPTS ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lobby.js"></script>

</body>
</html>
