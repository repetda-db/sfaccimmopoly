<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sfaccimmopoly — Partita</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/cards.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       TOP BAR
  ══════════════════════════════════════ -->
  <header id="top-bar">
    <span id="room-name-display">Stanza...</span>

    <div id="top-bar-actions">
      <button id="btn-rules"   class="btn-icon" title="Regole">📖</button>
      <button id="btn-leave"   class="btn-icon" title="Abbandona">🚪</button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       MAIN LAYOUT
  ══════════════════════════════════════ -->
  <main id="game-layout">

    <!-- LEFT — Player list -->
    <aside id="panel-players">
      <h2 class="panel-title">Giocatori</h2>
      <ul id="player-list"></ul>
    </aside>

    <!-- CENTER — Board -->
    <section id="board-wrap">
      <div id="board">
        <!-- Squares injected by JS -->
      </div>
    </section>

    <!-- RIGHT — Action panel -->
    <aside id="panel-actions">

      <!-- Waiting room (pre-game) -->
      <div id="phase-waiting">
        <p id="waiting-msg">In attesa di giocatori...</p>
        <button id="btn-start-game" class="btn-primary hidden">
          🎲 <span data-i18n="btn_start">Inizia partita</span>
        </button>
      </div>

      <!-- In-game controls -->
      <div id="phase-game" class="hidden">
        <div id="current-turn-banner">
          Turno di <strong id="turn-player-name">—</strong>
        </div>

        <div id="dice-area">
          <div id="die-1">⚀</div>
          <div id="die-2">⚁</div>
          <div id="dice-result">—</div>
        </div>

        <div class="action-buttons">
          <button id="btn-roll" class="btn-primary" data-i18n="btn_roll">🎲 Lancia</button>
          <button id="btn-end-turn" class="btn-secondary" disabled data-i18n="btn_end">Passa turno</button>
          <button id="btn-buy" class="btn-primary hidden" data-i18n="btn_buy">Compra</button>
          <button id="btn-pass" class="btn-secondary hidden" data-i18n="btn_pass">Passa</button>
          <button id="btn-mortgage" class="btn-secondary" data-i18n="btn_mortgage">Ipoteca</button>
          <button id="btn-build" class="btn-secondary" data-i18n="btn_build">Costruisci</button>
          <button id="btn-trade" class="btn-secondary" data-i18n="btn_trade">Scambia</button>
          <button id="btn-bankrupt" class="btn-danger hidden" data-i18n="btn_bankrupt">Bancarotta</button>
        </div>
      </div>
    </aside>
  </main>

  <!-- Log panel -->
  <section id="log-panel">
    <ul id="log-list"></ul>
  </section>

  <!-- Info property tooltip/panel -->
  <div id="info-panel" class="hidden"></div>

  <!-- ══════════════════════════════════════
       MODALS
  ══════════════════════════════════════ -->
  <!-- Generic modal (usato da UI.showModal) -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box" id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

  <!-- Card draw overlay -->
  <div id="card-overlay" class="modal-overlay hidden">
    <div id="card-face">
      <div class="card-deck-label"></div>
      <div class="card-icon"></div>
      <div id="card-text"></div>
      <button id="card-btn" class="btn-primary">OK</button>
    </div>
  </div>

  <!-- Trade panel -->
  <div id="trade-panel" class="hidden">
    <p>Scambio non ancora attivo</p>
  </div>

  <!-- Auction panel -->
  <div id="auction-panel" class="hidden">
    <div id="auction-prop"></div>
    <div id="auction-bid"></div>
    <div id="auction-timer"></div>
    <input type="number" id="auction-bid-input" placeholder="Offerta" />
    <button id="auction-bid-btn" class="btn-primary">Offri</button>
  </div>

  <!-- Property card modal -->
  <div id="modal-property" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 id="prop-name">Proprietà</h2>
      <p  id="prop-desc"></p>
      <div id="prop-details"></div>
      <div class="modal-footer">
        <button id="btn-prop-buy"   class="btn-primary">💰 Acquista</button>
        <button id="btn-prop-close" class="btn-secondary">Chiudi</button>
      </div>
    </div>
  </div>

  <!-- Chance / Community chest modal -->
  <div id="modal-card" class="modal-overlay hidden">
    <div class="modal-box modal-card-box">
      <p id="card-type-label">Probabilità</p>
      <p id="card-text"></p>
      <div class="modal-footer">
        <button id="btn-card-close" class="btn-primary">OK</button>
      </div>
    </div>
  </div>

  <!-- Bankruptcy modal -->
  <div id="modal-bankrupt" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>💸 Bancarotta!</h2>
      <p id="bankrupt-msg"></p>
      <div class="modal-footer">
        <button id="btn-bankrupt-ok" class="btn-secondary">Esci</button>
      </div>
    </div>
  </div>

  <!-- Trade modal (placeholder) -->
  <div id="modal-trade" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>🤝 Scambio</h2>
      <p>Funzione in arrivo...</p>
      <div class="modal-footer">
        <button id="btn-trade-close" class="btn-secondary">Chiudi</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
      SCRIPTS
  ══════════════════════════════════════ -->

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- 1. Config & inizializzazione Firebase -->
  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>

  <!-- 2. i18n / traduzioni -->
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>

  <!-- 3. Dati statici -->
  <script src="js/board-data.js"></script>
  <script src="js/cards-data.js"></script>
  <script src="js/images.js"></script>

  <!-- 4. Auth & sync -->
  <script src="js/auth.js"></script>
  <script src="js/sync.js"></script>

  <!-- 5. UI -->
  <script src="js/ui.js"></script>

  <!-- 6. Logica di gioco -->
  <script src="js/game-core.js"></script>
  <script src="js/game-actions.js"></script>
  <script src="js/quick-mode.js"></script>
  <script src="js/betting-mode.js"></script>

  <!-- 7. Entry point (SEMPRE per ultimo) -->
  <script src="js/main.js"></script>

</body>
</html>
