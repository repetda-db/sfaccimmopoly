<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sfaccimmopoly 🎲</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">

  <main class="login-container">
    <h1 class="login-title">🎲 Sfaccimmopoly</h1>
    <p class="login-subtitle" data-i18n="login.subtitle">
      Inserisci la password per entrare
    </p>

    <form id="login-form" class="login-form" autocomplete="off">
      <input
        type="password"
        id="password-input"
        class="login-input"
        placeholder="Password"
        required
        autofocus
      />
      <button type="submit" class="login-button" data-i18n="login.enter">
        Entra
      </button>
      <p id="login-error" class="login-error hidden" data-i18n="login.error">
        Password errata. Riprova.
      </p>
    </form>

    <div class="login-lang-switch">
      <button type="button" class="lang-btn" data-lang="it">🇮🇹 IT</button>
      <button type="button" class="lang-btn" data-lang="en">🇬🇧 EN</button>
    </div>

    <footer class="login-footer">
      <small>v0.1 — private game for friends</small>
    </footer>
  </main>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>  
  <script src="js/login.js"></script>

</body>
</html>
